<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shorts UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="header">zerotoin.com</div>

  <div id="post-container"></div>

  <div class="bottom-nav">
    <div class="nav-item" data-filter="all">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/home.png">
      <span>Home</span>
    </div>
    <div class="nav-item active" data-filter="video">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/video.png">
      <span>Video</span>
    </div>
    <div class="nav-item" data-filter="image">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/picture.png">
      <span>Image</span>
    </div>
    <div class="nav-item" data-filter="profile">
      <img src="https://img.icons8.com/ios-filled/50/ffffff/user.png">
      <span>Profile</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
