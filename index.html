<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Reels • Instagram Style</title>
    <!-- Cloudinary Upload Widget -->
    <script src="https://upload-widget.cloudinary.com/latest/global/all.js" type="text/javascript"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #fafafa;
            --header-bg: #ffffff;
            --text: #262626;
            --text-gray: #8e8e8e;
            --border: #dbdbdb;
            --button: #0095f6;
            --button-hover: #1877f2;
            --heart: #ed4956;
            --white: #ffffff;
            --shadow: 0 1px 2px rgba(0,0,0,0.05);
            --reel-width: 100%;
            --reel-max-width: 450px;
            --reel-height: calc(100vh - 50px);
            --icon-size: 22px;
            --header-height: 48px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* ========== HEADER ========== */
        .header {
            width: 100%;
            max-width: 600px;
            height: var(--header-height);
            background: var(--header-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            position: fixed;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .logo {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .nav-icons {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-btn {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            transition: background 0.2s;
            position: relative;
        }

        .nav-btn svg {
            width: var(--icon-size);
            height: var(--icon-size);
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            transition: color 0.2s;
        }

        .nav-btn.active svg {
            stroke: var(--button);
            fill: none;
        }

        .nav-btn:hover {
            background: #f2f2f2;
        }

        .profile-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #efefef;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-btn {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: none;
            cursor: pointer;
            margin-left: 2px;
        }

        .upload-btn svg {
            width: 24px;
            height: 24px;
            stroke: #262626;
            fill: none;
        }

        /* ========== REELS FEED ========== */
        .reels-container {
            width: 100%;
            max-width: var(--reel-max-width);
            height: 100vh;
            margin-top: var(--header-height);
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            scroll-behavior: smooth;
            background: #000;
        }

        .reel {
            width: 100%;
            height: var(--reel-height);
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .reel video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        /* Overlay controls */
        .reel-overlay {
            position: absolute;
            bottom: 80px;
            right: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 10;
        }

        .reel-action-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            transition: transform 0.1s;
        }

        .reel-action-btn svg {
            width: 26px;
            height: 26px;
            fill: #fff;
            filter: drop-shadow(0 1px 2px rgba(0,0,0,0.5));
        }

        .reel-action-btn.liked svg {
            fill: #ed4956;
        }

        .reel-info {
            position: absolute;
            bottom: 20px;
            left: 16px;
            right: 50px;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.7);
            z-index: 10;
        }

        .reel-username {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }

        .reel-caption {
            font-size: 0.8rem;
            opacity: 0.95;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .mute-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: #fff;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 12;
        }

        .mute-toggle svg {
            width: 18px;
            height: 18px;
            fill: #fff;
        }

        /* Empty state */
        .empty-reels {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 80%;
            color: #fff;
            text-align: center;
            gap: 12px;
        }

        .empty-reels p {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        /* Modal for link input */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.65);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }

        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }

        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .modal-box h3 {
            font-size: 1rem;
            text-align: center;
        }

        .modal-box input {
            padding: 12px;
            border: 2px solid #dbdbdb;
            border-radius: 10px;
            font-size: 0.85rem;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--button);
            color: white;
        }

        .btn-primary:hover {
            background: var(--button-hover);
        }

        .btn-outline {
            background: #efefef;
            color: #262626;
        }
    </style>
</head>
<body>

    <!-- HEADER with small navigation icons -->
    <header class="header">
        <span class="logo">📽️ Reels</span>
        <div class="nav-icons">
            <button class="nav-btn" title="Home">
                <svg viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            </button>
            <button class="nav-btn active" title="Reels">
                <svg viewBox="0 0 24 24"><path d="M15 10l-6 4V6z" fill="currentColor" stroke="none"/><rect x="2" y="3" width="20" height="18" rx="3" stroke="currentColor" fill="none"/></svg>
            </button>
            <button class="nav-btn" title="Images">
                <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><polyline points="21 15 16 10 5 21" stroke="currentColor" fill="none"/></svg>
            </button>
            <button class="nav-btn" title="Profile">
                <span class="profile-avatar">
                    <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7" fill="none" stroke="currentColor" stroke-width="2"/></svg>
                </span>
            </button>
            <!-- Upload trigger (camera icon) -->
            <button class="upload-btn" id="openUploadModal" title="Add Reel">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="13" r="3"/><path d="M5 7h1a2 2 0 002-2 1 1 0 011-1h6a1 1 0 011 1 2 2 0 002 2h1a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V9a2 2 0 012-2z"/><circle cx="12" cy="13" r="3" fill="none"/></svg>
            </button>
        </div>
    </header>

    <!-- REELS FEED -->
    <main class="reels-container" id="reelsContainer">
        <!-- Reels will be dynamically inserted here -->
        <div class="empty-reels" id="emptyState">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
            <p>No reels yet.<br>Tap the camera icon to upload!</p>
        </div>
    </main>

    <!-- UPLOAD MODAL (paste link or Cloudinary upload) -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal-box">
            <h3>Add a Reel</h3>
            <input type="url" id="reelLinkInput" placeholder="Paste video link (.mp4) ...">
            <button class="btn btn-primary" id="btnLoadFromLink">➕ Add from Link</button>
            <div style="text-align:center; color:#8e8e8e; font-size:0.8rem;">or</div>
            <button class="btn btn-primary" id="btnCloudinaryUpload">☁️ Upload via Cloudinary</button>
            <div class="modal-actions">
                <button class="btn btn-outline" id="btnCloseModal">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ================= SCRIPTS (image.js) ================= -->
    <script>
        (function() {
            // ---------- CONFIGURATION ----------
            const CLOUDINARY_CLOUD_NAME = 'demo';      // ← Replace with your cloud name
            const CLOUDINARY_UPLOAD_PRESET = 'ml_default'; // ← Replace with your upload preset

            // ---------- DOM ELEMENTS ----------
            const reelsContainer = document.getElementById('reelsContainer');
            const emptyState = document.getElementById('emptyState');
            const uploadModal = document.getElementById('uploadModal');
            const openUploadModalBtn = document.getElementById('openUploadModal');
            const closeModalBtn = document.getElementById('btnCloseModal');
            const reelLinkInput = document.getElementById('reelLinkInput');
            const btnLoadFromLink = document.getElementById('btnLoadFromLink');
            const btnCloudinaryUpload = document.getElementById('btnCloudinaryUpload');

            // ---------- REEL STORAGE ----------
            const STORAGE_KEY = 'insta_reels_feed';
            let reels = [];

            function loadReelsFromStorage() {
                try {
                    const data = localStorage.getItem(STORAGE_KEY);
                    reels = data ? JSON.parse(data) : [];
                } catch (e) {
                    reels = [];
                }
            }

            function saveReelsToStorage() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(reels.slice(0, 30))); // keep max 30
            }

            // ---------- RENDER REELS ----------
            function renderReels() {
                // Clear container except static elements
                reelsContainer.innerHTML = '';
                if (reels.length === 0) {
                    reelsContainer.innerHTML = `
                        <div class="empty-reels" id="emptyState">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                            <p>No reels yet.<br>Tap the camera icon to upload!</p>
                        </div>
                    `;
                    return;
                }

                reels.forEach((reel, index) => {
                    const reelDiv = document.createElement('div');
                    reelDiv.className = 'reel';
                    reelDiv.innerHTML = `
                        <video src="${escapeAttr(reel.url)}" loop muted playsinline preload="metadata"></video>
                        <button class="mute-toggle" data-muted="true" title="Unmute">
                            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/><line x1="23" y1="9" x2="17" y2="15" stroke="white" stroke-width="2"/></svg>
                        </button>
                        <div class="reel-overlay">
                            <button class="reel-action-btn like-btn" data-index="${index}">
                                <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                                <span class="like-count">0</span>
                            </button>
                            <button class="reel-action-btn">
                                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                                <span>0</span>
                            </button>
                            <button class="reel-action-btn">
                                <svg viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
                            </button>
                        </div>
                        <div class="reel-info">
                            <div class="reel-username">@user_${index + 1}</div>
                            <div class="reel-caption">${escapeAttr(reel.caption || 'Reel ' + (index + 1))}</div>
                        </div>
                    `;
                    reelsContainer.appendChild(reelDiv);

                    // Mute toggle
                    const video = reelDiv.querySelector('video');
                    const muteBtn = reelDiv.querySelector('.mute-toggle');
                    muteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const isMuted = video.muted;
                        video.muted = !isMuted;
                        muteBtn.dataset.muted = video.muted;
                        muteBtn.innerHTML = video.muted
                            ? '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/><line x1="23" y1="9" x2="17" y2="15" stroke="white" stroke-width="2"/></svg>'
                            : '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>';
                    });

                    // Like button (visual only)
                    const likeBtn = reelDiv.querySelector('.like-btn');
                    likeBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        likeBtn.classList.toggle('liked');
                        const countSpan = likeBtn.querySelector('.like-count');
                        let count = parseInt(countSpan.textContent) || 0;
                        count = likeBtn.classList.contains('liked') ? count + 1 : count - 1;
                        countSpan.textContent = Math.max(0, count);
                    });
                });

                // Auto‑play/pause with Intersection Observer
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const vid = entry.target.querySelector('video');
                        if (!vid) return;
                        if (entry.isIntersecting) {
                            vid.play().catch(() => {});
                        } else {
                            vid.pause();
                        }
                    });
                }, { threshold: 0.7 });

                document.querySelectorAll('.reel').forEach(reel => observer.observe(reel));
            }

            function escapeAttr(str) {
                return String(str).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            }

            // ---------- ADD NEW REEL ----------
            function addReel(url, caption = '') {
                if (!url) return;
                reels.unshift({
                    url: url,
                    caption: caption || 'New reel',
                    addedAt: Date.now()
                });
                saveReelsToStorage();
                renderReels();
                // Scroll to top to show newest reel
                reelsContainer.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // ---------- CLOUDINARY UPLOAD ----------
            function openCloudinaryWidget() {
                if (typeof cloudinary === 'undefined') {
                    alert('Cloudinary script not loaded. Check your connection.');
                    return;
                }
                const widget = cloudinary.createUploadWidget({
                    cloudName: CLOUDINARY_CLOUD_NAME,
                    uploadPreset: CLOUDINARY_UPLOAD_PRESET,
                    sources: ['local', 'url', 'camera'],
                    resourceType: 'video',
                    clientAllowedFormats: ['mp4', 'mov', 'webm'],
                    maxFileSize: 200 * 1024 * 1024,
                    showAdvancedOptions: false,
                    multiple: false,
                }, (error, result) => {
                    if (error) {
                        alert('Upload error: ' + error.message);
                        return;
                    }
                    if (result && result.event === 'success') {
                        const videoUrl = result.info.secure_url;
                        const caption = result.info.original_filename || 'Cloudinary reel';
                        addReel(videoUrl, caption);
                        uploadModal.classList.remove('active');
                        reelLinkInput.value = videoUrl; // pre‑fill for reference
                    }
                });
                widget.open();
            }

            // ---------- MODAL CONTROLS ----------
            openUploadModalBtn.addEventListener('click', () => {
                uploadModal.classList.add('active');
                reelLinkInput.focus();
            });

            closeModalBtn.addEventListener('click', () => {
                uploadModal.classList.remove('active');
            });

            btnCloudinaryUpload.addEventListener('click', () => {
                openCloudinaryWidget();
            });

            btnLoadFromLink.addEventListener('click', () => {
                const link = reelLinkInput.value.trim();
                if (!link) {
                    alert('Paste a video URL first.');
                    return;
                }
                if (!link.startsWith('http')) {
                    alert('Please enter a valid URL.');
                    return;
                }
                addReel(link, 'Link reel');
                uploadModal.classList.remove('active');
                reelLinkInput.value = '';
            });

            // Close modal on overlay click
            uploadModal.addEventListener('click', (e) => {
                if (e.target === uploadModal) {
                    uploadModal.classList.remove('active');
                }
            });

            // ---------- INIT ----------
            loadReelsFromStorage();

            // If no reels in storage, add a couple of demo public videos (optional)
            if (reels.length === 0) {
                // Small sample videos (public domain, short vertical-ish)
                const sampleReels = [
                    { url: 'https://res.cloudinary.com/demo/video/upload/v1687364745/samples/sea-turtle.mp4', caption: 'Sea turtle 🐢' },
                    { url: 'https://res.cloudinary.com/demo/video/upload/v1687364744/samples/dance.mp4', caption: 'Dance moves 🕺' }
                ];
                reels = sampleReels;
                saveReelsToStorage();
            }
            renderReels();

            console.log('✅ Instagram Reels ready. Cloudinary cloud:', CLOUDINARY_CLOUD_NAME);
        })();
    </script>
</body>
</html>
