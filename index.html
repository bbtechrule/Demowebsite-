<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reels • Facebook Style</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --header-height: 48px;
            --bg: #f0f2f5;
            --white: #ffffff;
            --text: #050505;
            --gray: #65676b;
            --accent: #1877f2;
            --border: #dadde1;
            --shadow: 0 1px 2px rgba(0,0,0,0.1);
            --icon-size: 22px;
        }

        body {
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #18191a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Facebook‑like container */
        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            max-height: 850px;
            background: #000;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border-radius: 0;
        }
        @media (min-width: 501px) {
            .app {
                border-radius: 16px;
                margin: 10px;
                height: 95vh;
            }
        }

        /* ========== HEADER (Facebook style) ========== */
        .header {
            height: var(--header-height);
            background: var(--white);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            flex-shrink: 0;
        }
        .header-logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent);
            letter-spacing: -0.5px;
        }
        .nav-icons {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .nav-btn {
            background: none;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }
        .nav-btn svg {
            width: var(--icon-size);
            height: var(--icon-size);
            fill: #65676b;
            transition: fill 0.15s;
        }
        .nav-btn.active svg {
            fill: var(--accent);
        }
        .nav-btn:hover {
            background: #f0f2f5;
        }
        .nav-btn.active::after {
            content: '';
            position: absolute;
            bottom: -10px;
            width: 100%;
            height: 3px;
            background: var(--accent);
            border-radius: 1px 1px 0 0;
        }
        .profile-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #ccd0d5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ========== MAIN AREA (Reels feed) ========== */
        .reels-container {
            flex: 1;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            -webkit-overflow-scrolling: touch;
            background: #000;
        }
        .reel {
            width: 100%;
            height: 100%;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        .reel video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .reel-overlay {
            position: absolute;
            right: 12px;
            bottom: 80px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 5;
        }
        .reel-action {
            background: none;
            border: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .reel-action svg {
            width: 26px;
            height: 26px;
            fill: white;
            filter: drop-shadow(0 1px 2px black);
        }
        .reel-info {
            position: absolute;
            left: 16px;
            bottom: 24px;
            right: 50px;
            color: white;
            text-shadow: 0 1px 3px rgba(0,0,0,0.7);
            z-index: 5;
        }
        .reel-username {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .reel-caption {
            font-size: 0.8rem;
            opacity: 0.9;
            margin-top: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .mute-toggle {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0,0,0,0.55);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
        }
        .mute-toggle svg {
            width: 18px;
            height: 18px;
            fill: white;
        }

        /* ========== ADD LINK FLOATING BUTTON & MODAL ========== */
        .add-link-btn {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--white);
            border: none;
            padding: 10px 20px;
            border-radius: 24px;
            font-weight: 600;
            font-size: 0.8rem;
            box-shadow: 0 4px 18px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            z-index: 20;
        }
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-box {
            background: white;
            border-radius: 14px;
            padding: 20px;
            width: 85%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .modal-box h3 {
            text-align: center;
            font-weight: 600;
            font-size: 1rem;
        }
        .modal-box input {
            padding: 12px;
            border: 2px solid #dddfe2;
            border-radius: 10px;
            font-size: 0.85rem;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-outline {
            background: #e4e6eb;
            color: #050505;
        }
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #b0b3b8;
            text-align: center;
            gap: 12px;
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- ========== HEADER ========== -->
        <header class="header">
            <span class="header-logo">Reels</span>
            <div class="nav-icons">
                <button class="nav-btn active" title="Home">
                    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                </button>
                <button class="nav-btn" title="Photos">
                    <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                </button>
                <button class="nav-btn" title="Videos">
                    <svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                </button>
                <button class="nav-btn" title="Profile">
                    <span class="profile-avatar">
                        <svg viewBox="0 0 24 24" fill="#65676b"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v1.2c0 .66.54 1.2 1.2 1.2h16.8c.66 0 1.2-.54 1.2-1.2v-1.2c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
                    </span>
                </button>
            </div>
        </header>

        <!-- ========== REELS FEED ========== -->
        <div class="reels-container" id="reelsContainer">
            <!-- Empty state -->
            <div class="empty-state" id="emptyState">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#b0b3b8" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                <p>No reels yet.<br>Tap the button below to paste a Cloudinary link</p>
            </div>
        </div>

        <!-- Floating button to add a reel link -->
        <button class="add-link-btn" id="btnOpenLinkModal">➕ Add Cloudinary Link</button>

        <!-- Modal for pasting link -->
        <div class="modal-overlay" id="linkModal">
            <div class="modal-box">
                <h3>Paste Cloudinary Video Link</h3>
                <input type="url" id="videoLinkInput" placeholder="https://res.cloudinary.com/...">
                <button class="btn btn-primary" id="btnAddReel">Add to Reels</button>
                <div class="modal-actions">
                    <button class="btn btn-outline" id="btnCloseModal">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // ===================== STATE =====================
            let reels = [];   // each: { url, caption, addedAt }
            const STORAGE_KEY = 'fb_reels_data';

            // ===================== DOM =====================
            const reelsContainer = document.getElementById('reelsContainer');
            const emptyState = document.getElementById('emptyState');
            const linkModal = document.getElementById('linkModal');
            const btnOpenLinkModal = document.getElementById('btnOpenLinkModal');
            const btnCloseModal = document.getElementById('btnCloseModal');
            const videoLinkInput = document.getElementById('videoLinkInput');
            const btnAddReel = document.getElementById('btnAddReel');

            // ===================== LOAD / SAVE =====================
            function loadReels() {
                try {
                    const stored = localStorage.getItem(STORAGE_KEY);
                    reels = stored ? JSON.parse(stored) : [];
                } catch (e) {
                    reels = [];
                }
                // Fallback demo reels (optional)
                if (reels.length === 0) {
                    reels = [
                        { url:'https://res.cloudinary.com/demo/video/upload/v1687364745/samples/sea-turtle.mp4', caption:'Sea turtle 🐢' },
                        { url:'https://res.cloudinary.com/demo/video/upload/v1687364744/samples/dance.mp4', caption:'Dance vibes' }
                    ];
                }
                saveReels();
            }
            function saveReels() {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(reels));
            }

            function escapeAttr(str) {
                return String(str).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            }

            // ===================== RENDER REELS =====================
            function renderReels() {
                reelsContainer.innerHTML = '';
                if (reels.length === 0) {
                    reelsContainer.innerHTML = `<div class="empty-state" id="emptyState">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#b0b3b8" stroke-width="1.5"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                        <p>No reels yet.<br>Tap the button below to paste a Cloudinary link</p>
                    </div>`;
                    return;
                }
                reels.forEach((reel, idx) => {
                    const reelDiv = document.createElement('div');
                    reelDiv.className = 'reel';
                    reelDiv.innerHTML = `
                        <video src="${escapeAttr(reel.url)}" loop muted playsinline preload="metadata"></video>
                        <button class="mute-toggle">
                            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/><line x1="23" y1="9" x2="17" y2="15" stroke="white" stroke-width="2"/></svg>
                        </button>
                        <div class="reel-overlay">
                            <button class="reel-action"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>0</span></button>
                            <button class="reel-action"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg><span>0</span></button>
                        </div>
                        <div class="reel-info">
                            <div class="reel-username">@reel_user</div>
                            <div class="reel-caption">${escapeAttr(reel.caption || 'Reel '+(idx+1))}</div>
                        </div>
                    `;
                    reelsContainer.appendChild(reelDiv);

                    // Mute toggle
                    const video = reelDiv.querySelector('video');
                    const muteBtn = reelDiv.querySelector('.mute-toggle');
                    muteBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        video.muted = !video.muted;
                        muteBtn.innerHTML = video.muted
                            ? '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/><line x1="23" y1="9" x2="17" y2="15" stroke="white" stroke-width="2"/></svg>'
                            : '<svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>';
                    });
                });

                // Auto‑play/pause with Intersection Observer
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const vid = entry.target.querySelector('video');
                        if (!vid) return;
                        if (entry.isIntersecting) {
                            vid.play().catch(() => {});
                        } else {
                            vid.pause();
                        }
                    });
                }, { threshold: 0.7 });

                document.querySelectorAll('.reel').forEach(el => observer.observe(el));
            }

            // ===================== ADD REEL =====================
            function addReel(url, caption = 'Cloudinary reel') {
                if (!url) return;
                reels.unshift({ url, caption, addedAt: Date.now() });
                saveReels();
                renderReels();
                // Scroll to top to see newest
                reelsContainer.scrollTo({ top: 0, behavior: 'smooth' });
            }

            // ===================== MODAL HANDLERS =====================
            btnOpenLinkModal.addEventListener('click', () => {
                linkModal.classList.add('active');
                videoLinkInput.focus();
            });
            btnCloseModal.addEventListener('click', () => {
                linkModal.classList.remove('active');
                videoLinkInput.value = '';
            });
            linkModal.addEventListener('click', (e) => {
                if (e.target === linkModal) {
                    linkModal.classList.remove('active');
                    videoLinkInput.value = '';
                }
            });

            btnAddReel.addEventListener('click', () => {
                const link = videoLinkInput.value.trim();
                if (!link) {
                    alert('Please paste a video link.');
                    return;
                }
                if (!link.startsWith('http')) {
                    alert('Enter a valid URL.');
                    return;
                }
                addReel(link, 'Pasted reel');
                linkModal.classList.remove('active');
                videoLinkInput.value = '';
            });

            // Allow Enter key to submit
            videoLinkInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') btnAddReel.click();
            });

            // ===================== HEADER NAVIGATION =====================
            const navButtons = document.querySelectorAll('.nav-btn');
            navButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    navButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    // Simple feedback for demo
                    const title = btn.getAttribute('title');
                    if (title === 'Photos') alert('📷 Photos section (demo)');
                    if (title === 'Videos') {
                        // Scroll to video section (already visible)
                        reelsContainer.scrollTo({ top: 0, behavior: 'smooth' });
                    }
                    if (title === 'Profile') alert('👤 Profile page (demo)');
                });
            });

            // ===================== INIT =====================
            loadReels();
            renderReels();
        })();
    </script>
</body>
</html>
